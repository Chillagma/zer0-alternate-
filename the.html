<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibrant RGB Colors</title>
    <style>
        body {
            background-color: #101010;
            color: white;
            font-family: Arial, sans-serif;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 15px #ff0000; }
            100% { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #0000ff; }
        }

        .neon {
            font-size: 2em;
            text-shadow: 0 0 5px #00ffff, 0 0 10px #ff00ff, 0 0 15px #ff0000;
            animation: neon 1.5s infinite alternate;
        }

        @keyframes neon {
            0% { text-shadow: 0 0 10px #00ff00; }
            50% { text-shadow: 0 0 20px #ff00ff; }
            100% { text-shadow: 0 0 30px #0000ff; }
        }
    </style>
</head>
<body>
    <h1 class="neon">Welcome to the Vibrant RGB Experience!</h1>
    <p>Witness the beauty of neon colors lighting up the dark!</p>
</body>
</html>
