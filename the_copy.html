<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple 3D FPS</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="player-log" style="color: white; position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px; max-width: 300px;"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="mini_map.js"></script>
  <script src="mini_map_shooting.js"></script>
  <script src="3d_object_loader.js"></script>
  <script src="levels.js"></script>
  <script src="shooting.js"></script>
  <script src="player_movement.js"></script>
  <script src="art_style.js"></script>
  <script src="game.js"></script>
<script>
  
  const socket = io();
  window.socket = socket;
  var the = [];
  // Send initial player state when connected
  socket.on('connect', function() {
    // You can randomize or customize the initial state as needed
    let initialState = { x: Math.random() * 300 + 100, y: Math.random() * 300 + 100, z: 0, angle: 0 };
    socket.emit('player_update', initialState);
  });
  // Listen for updates from the server
  socket.on('players_update', function(players) {
    // You can update your local player list or render other players here
    // Display the list of players in the #player-log div
    const playerLog = document.getElementById('player-log');
    if (playerLog) {
      const playerIds = Object.keys(players);
      
      if (playerIds.length === 0) {
        playerLog.textContent = 'No players online.';
      } else {
        
        let message = '<b>Players online:</b><br>' + playerIds.map(id => {
          const p = players[id];
          return `Player ${id}: x=${p.x?.toFixed(2) ?? 'N/A'}, y=${p.y?.toFixed(2) ?? 'N/A'}, z=${p.z?.toFixed(2) ?? 'N/A'}`;
        }).join('<br>');
        if (playerIds.length >= 4) {
          message += `<br><span style="color: yellow; font-weight: bold;">${playerIds.length} players online!</span>`;
        }
        playerLog.innerHTML = message;
      }
    }
    // Optionally keep the console log for debugging
    console.log(players);
  });
</script>
  
</body>
</html>
